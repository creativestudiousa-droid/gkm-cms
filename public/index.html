<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GKM CMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--white:#fff;--sidebar:#1e293b;--sidebar-hover:#334155;
  --primary:#2D7A4F;--primary-dark:#1f5c3a;--primary-light:#e8f5ee;
  --text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;
  --danger:#ef4444;--warning:#f59e0b;--success:#10b981;--info:#3b82f6;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow-md:0 4px 16px rgba(0,0,0,.1);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
/* ── LAYOUT ── */
.cms-layout{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;transition:transform .3s}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo img{height:32px;width:auto;filter:brightness(0) invert(1)}
.sidebar-logo span{display:block;color:rgba(255,255,255,.45);font-size:11px;margin-top:4px;letter-spacing:.04em}
.sidebar-section{padding:16px 12px 4px;color:rgba(255,255,255,.35);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:rgba(255,255,255,.65);text-decoration:none;border-radius:8px;margin:1px 8px;cursor:pointer;transition:all .15s;font-size:13.5px;font-weight:500;border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--sidebar-hover);color:#fff}
.nav-item.active{background:var(--primary);color:#fff}
.nav-item i{width:18px;text-align:center;font-size:15px}
.nav-item .badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600}
.main{margin-left:260px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.topbar-title{font-size:17px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-menu{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 12px;border-radius:8px;transition:background .15s}
.user-menu:hover{background:var(--bg)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.content{padding:28px;flex:1}
/* ── CARDS ── */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:15px;font-weight:600}
.card-body{padding:20px}
/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;display:flex;align-items:center;gap:16px}
.stat-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-value{font-size:26px;font-weight:700;line-height:1}
.stat-label{color:var(--text-muted);font-size:12.5px;margin-top:3px}
.stat-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:none;color:var(--text-muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:5px 12px;font-size:12.5px}
.btn-icon{padding:7px;width:34px;height:34px;justify-content:center}
/* ── FORMS ── */
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
.form-label span{color:var(--danger);margin-left:2px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;font-family:inherit;color:var(--text);background:#fff;transition:border-color .15s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(45,122,79,.12)}
.form-textarea{resize:vertical;min-height:90px}
.form-hint{font-size:12px;color:var(--text-muted);margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
/* ── TABLE ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:#f8fafc}
th{text-align:left;padding:11px 16px;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;gap:4px}
.badge-success{background:#dcfce7;color:#166534}
.badge-draft{background:#f1f5f9;color:#475569}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-info{background:#dbeafe;color:#1e40af}
.badge-gst{background:#fce7f3;color:#9d174d}
.badge-tds{background:#fff7ed;color:#9a3412}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:14px;width:100%;max-width:780px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .2s ease}
.modal-lg{max-width:1100px}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:background .15s}
.modal-close:hover{background:var(--border)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
/* ── EDITOR ── */
.editor-layout{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start}
.editor-sidebar{display:flex;flex-direction:column;gap:16px}
.editor-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.editor-card h4{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
.ql-editor{min-height:400px;font-size:15px;font-family:'Inter',sans-serif;line-height:1.7}
.ql-toolbar{border-radius:8px 8px 0 0}
.ql-container{border-radius:0 0 8px 8px;font-size:15px}
/* ── MEDIA GRID ── */
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.media-item{border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.media-item:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(45,122,79,.2)}
.media-item.selected{border-color:var(--primary);box-shadow:0 0 0 3px rgba(45,122,79,.25)}
.media-item img{width:100%;height:120px;object-fit:cover;display:block}
.media-item-info{padding:8px 10px}
.media-item-name{font-size:11.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.media-item-size{font-size:11px;color:var(--text-muted)}
.media-item .delete-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:6px;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:11px}
.media-item:hover .delete-btn{display:flex}
/* ── UPLOAD ZONE ── */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:var(--primary-light)}
.upload-zone i{font-size:36px;color:var(--text-muted);margin-bottom:12px;display:block}
/* ── SEARCH ── */
.search-row{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.search-input{position:relative;flex:1;min-width:200px}
.search-input i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.search-input input{padding-left:34px;width:100%}
/* ── TOAST ── */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;font-size:13.5px;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px;animation:slideIn .2s ease}
.toast.success{background:#166534}.toast.error{background:#991b1b}.toast.info{background:#1e40af}
@keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
/* ── TABS ── */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:9px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-weight:500;font-size:13.5px;color:var(--text-muted);border:none;background:none;transition:all .15s}
.tab.active{color:var(--primary);border-bottom:2px solid var(--primary);margin-bottom:-2px}
.tab:hover:not(.active){color:var(--text);background:var(--bg)}
/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0F1C35 0%,#1a3a28 50%,#2D7A4F 100%)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo img{height:44px;width:auto}
.login-logo p{color:var(--text-muted);margin-top:6px;font-size:13.5px}
.login-error{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
/* ── MISC ── */
.sep{height:1px;background:var(--border);margin:20px 0}
.text-muted{color:var(--text-muted)}
.text-sm{font-size:12.5px}
.flex{display:flex;align-items:center}
.gap-2{gap:8px}.gap-3{gap:12px}
.ms-auto{margin-left:auto}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state i{font-size:48px;margin-bottom:12px;display:block;opacity:.3}
.page-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title h1{font-size:22px;font-weight:700}
.compliance-row{display:grid;grid-template-columns:1fr 100px 100px 120px 80px;gap:8px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.compliance-row:last-child{border-bottom:none}
.days-badge{font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px}
.days-urgent{background:#fee2e2;color:#991b1b}
.days-soon{background:#fef3c7;color:#92400e}
.days-ok{background:#f1f5f9;color:#475569}
.sidebar-footer{margin-top:auto;padding:12px 8px;border-top:1px solid rgba(255,255,255,.08)}
.view-site-btn{display:flex;align-items:center;gap:10px;padding:9px 16px;color:rgba(255,255,255,.5);border-radius:8px;text-decoration:none;font-size:13px;transition:all .15s}
.view-site-btn:hover{background:rgba(255,255,255,.07);color:#fff}
/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0}.form-row{grid-template-columns:1fr}.editor-layout{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toasts"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script>
// ════════════════════════════════════════════════
// GKM CMS — Complete Frontend
// ════════════════════════════════════════════════

const API = window.location.origin;
let currentUser = null;
let quillInstance = null;
let currentPage = 'dashboard';
let mediaPickerCallback = null;

// ── Utilities ──
const getToken = () => localStorage.getItem('gkm_cms_token');
const setToken = (t) => localStorage.setItem('gkm_cms_token', t);
const clearToken = () => { localStorage.removeItem('gkm_cms_token'); localStorage.removeItem('gkm_cms_user'); };

async function request(method, path, body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (res.status === 401) { clearToken(); renderLogin(); return null; }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function toast(msg, type = 'success') {
  const wrap = document.getElementById('toasts');
  const icons = { success: 'fa-check-circle', error: 'fa-circle-xmark', info: 'fa-circle-info' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="fas ${icons[type]||icons.success}"></i> ${msg}`;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}

function daysUntil(d) {
  const diff = Math.ceil((new Date(d) - new Date()) / 86400000);
  if (diff < 0) return `<span class="days-badge days-urgent">${Math.abs(diff)}d overdue</span>`;
  if (diff <= 7) return `<span class="days-badge days-urgent">${diff}d</span>`;
  if (diff <= 30) return `<span class="days-badge days-soon">${diff}d</span>`;
  return `<span class="days-badge days-ok">${diff}d</span>`;
}

function slugify(t) { return t.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }

// ── App Shell ──
function renderShell() {
  const u = currentUser || {};
  const initials = (u.name || 'GK').split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('app').innerHTML = `
    <div class="cms-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <img src="/cms-logo.png" onerror="this.style.display='none';this.nextSibling.style.display='block'" alt="GKM">
          <div style="color:#fff;font-weight:700;font-size:16px;display:none">GK Malik & Associates</div>
          <span>Content Management System</span>
        </div>
        <div class="sidebar-section">Main</div>
        <a class="nav-item" onclick="navigate('dashboard')" id="nav-dashboard"><i class="fas fa-gauge"></i> Dashboard</a>
        <div class="sidebar-section">Content</div>
        <a class="nav-item" onclick="navigate('pages')" id="nav-pages"><i class="fas fa-file-alt"></i> Pages</a>
        <a class="nav-item" onclick="navigate('posts')" id="nav-posts"><i class="fas fa-newspaper"></i> Blog / Insights</a>
        <a class="nav-item" onclick="navigate('media')" id="nav-media"><i class="fas fa-images"></i> Media Library</a>
        <div class="sidebar-section">Site</div>
        <a class="nav-item" onclick="navigate('settings')" id="nav-settings"><i class="fas fa-sliders"></i> Site Settings</a>
        <a class="nav-item" onclick="navigate('menus')" id="nav-menus"><i class="fas fa-bars"></i> Menus</a>
        <div class="sidebar-section">CRM</div>
        <a class="nav-item" onclick="navigate('leads')" id="nav-leads"><i class="fas fa-inbox"></i> Leads <span class="badge" id="leads-badge" style="display:none"></span></a>
        <a class="nav-item" onclick="navigate('clients')" id="nav-clients"><i class="fas fa-users"></i> Clients</a>
        <a class="nav-item" onclick="navigate('compliance')" id="nav-compliance"><i class="fas fa-calendar-check"></i> Compliance</a>
        <div class="sidebar-section">Tools</div>
        <a class="nav-item" onclick="navigate('ai')" id="nav-ai"><i class="fas fa-robot"></i> GKM AI Assistant</a>
        <div class="sidebar-footer">
          <a class="view-site-btn" href="https://gkmalik.netlify.app" target="_blank"><i class="fas fa-external-link-alt"></i> View Website</a>
        </div>
      </aside>
      <div class="main">
        <div class="topbar">
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-icon d-md-none" onclick="document.getElementById('sidebar').classList.toggle('open')">
              <i class="fas fa-bars"></i>
            </button>
            <span class="topbar-title" id="page-title">Dashboard</span>
          </div>
          <div class="topbar-right">
            <div class="user-menu" onclick="showUserMenu()">
              <div class="user-avatar">${initials}</div>
              <span style="font-size:13.5px;font-weight:500">${u.name || 'Admin'}</span>
              <i class="fas fa-chevron-down" style="font-size:11px;color:var(--text-muted)"></i>
            </div>
          </div>
        </div>
        <div class="content" id="content">Loading...</div>
      </div>
    </div>`;
  loadNewLeadsBadge();
}

function setActive(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + page);
  if (el) el.classList.add('active');
}

async function navigate(page) {
  currentPage = page;
  setActive(page);
  const titles = { dashboard:'Dashboard', pages:'Pages', posts:'Blog / Insights', media:'Media Library', settings:'Site Settings', menus:'Menus', leads:'Leads & Enquiries', clients:'Clients', compliance:'Compliance Calendar', ai:'GKM AI Assistant' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const content = document.getElementById('content');
  content.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)"><i class="fas fa-spinner fa-spin" style="font-size:24px"></i></div>';
  const pages = { dashboard: renderDashboard, pages: renderPages, posts: renderPosts, media: renderMedia, settings: renderSettings, leads: renderLeads, clients: renderClients, compliance: renderCompliance, ai: renderAI, menus: renderMenus };
  if (pages[page]) await pages[page]();
}

async function loadNewLeadsBadge() {
  try {
    const d = await request('GET', '/api/leads?status=new');
    const badge = document.getElementById('leads-badge');
    if (badge && d?.total > 0) { badge.textContent = d.total; badge.style.display = 'inline'; }
  } catch {}
}

function showUserMenu() {
  const existing = document.getElementById('user-dropdown');
  if (existing) { existing.remove(); return; }
  const dropdown = document.createElement('div');
  dropdown.id = 'user-dropdown';
  dropdown.style.cssText = 'position:fixed;top:60px;right:16px;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-md);z-index:300;min-width:180px;padding:6px';
  dropdown.innerHTML = `
    <div style="padding:10px 14px;border-bottom:1px solid var(--border);margin-bottom:4px">
      <div style="font-weight:600;font-size:13.5px">${currentUser?.name}</div>
      <div style="font-size:12px;color:var(--text-muted)">${currentUser?.email}</div>
    </div>
    <a class="nav-item" style="margin:0;padding:8px 14px;color:var(--text)" onclick="navigate('settings');document.getElementById('user-dropdown')?.remove()"><i class="fas fa-cog"></i> Settings</a>
    <a class="nav-item" style="margin:0;padding:8px 14px;color:var(--danger)" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</a>`;
  document.body.appendChild(dropdown);
  setTimeout(() => document.addEventListener('click', function h(e) { if (!dropdown.contains(e.target)) { dropdown.remove(); document.removeEventListener('click',h); } }), 100);
}

function logout() { clearToken(); renderLogin(); }

// ════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════
function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-logo">
          <img src="/cms-logo.png" onerror="this.style.display='none'" alt="GKM">

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  err.style.display = 'none';
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
  btn.disabled = true;
  try {
    const data = await request('POST', '/api/auth/login', { email, password: pass });
    if (!data) { btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In'; btn.disabled = false; return; }
    setToken(data.token);
    localStorage.setItem('gkm_cms_user', JSON.stringify(data.user));
    currentUser = data.user;
    renderShell();
    navigate('dashboard');
  } catch (e) {
    err.textContent = e.message; err.style.display = 'block';
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In'; btn.disabled = false;
  }
}

async function savePage(id) {
  const body = {
    title: document.getElementById('page-title').value.trim(),
    slug: document.getElementById('page-slug').value.trim(),
    template: document.getElementById('page-template').value,
    hero_heading: document.getElementById('page-hero-heading').value,
    hero_subheading: document.getElementById('page-hero-sub').value,
    hero_cta_text: document.getElementById('page-cta-text').value,
    hero_cta_link: document.getElementById('page-cta-link').value,
    hero_image: document.getElementById('page-hero-image').value,
    content: quillInstance ? quillInstance.root.innerHTML : '',
    status: document.getElementById('page-status').value,
    meta_title: document.getElementById('page-meta-title').value,
    meta_description: document.getElementById('page-meta-desc').value,
  };
  if (!body.title || !body.slug) { toast('Title and slug are required', 'error'); return; }
  try {
    if (id) await request('PUT', '/api/pages/' + id, body);
    else await request('POST', '/api/pages', body);
    toast('Page saved!'); closeModal(); renderPages();
  } catch (e) { toast(e.message, 'error'); }
}

async function filterPosts() {
  const search = document.getElementById('post-search').value;
  const status = document.getElementById('post-status-filter').value;
  const category = document.getElementById('post-cat-filter').value;
  let url = '/api/posts?limit=30';
  if (status) url += '&status=' + status;
  if (category) url += '&category=' + encodeURIComponent(category);
  if (search) url += '&search=' + encodeURIComponent(search);
  const d = await request('GET', url);
  document.getElementById('posts-tbody').innerHTML = renderPostRows(d.data);
}

async function renderMedia(pickerMode = false, callback = null) {
  const d = await request('GET', '/api/media');
  const el = pickerMode ? document.getElementById('media-picker-content') : document.getElementById('content');
  if (!el) return;
  el.innerHTML = `
    ${!pickerMode ? '<div class="page-title"><h1>Media Library</h1></div>' : ''}
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-upload').click()">
      <i class="fas fa-cloud-upload-alt"></i>
      <p style="font-weight:600;font-size:15px">Click to upload or drag & drop</p>
      <p class="text-muted text-sm">PNG, JPG, WebP, SVG — max 10MB each. Multiple files supported.</p>
    </div>
    <input type="file" id="file-upload" style="display:none" accept="image/*" multiple onchange="uploadMedia(this.files)">
    <div id="upload-prog" style="display:none;margin:12px 0">
      <div style="background:var(--border);border-radius:4px;height:6px"><div id="upload-bar" style="background:var(--primary);height:6px;border-radius:4px;width:0;transition:width .3s"></div></div>
      <div id="upload-status" class="text-sm text-muted" style="margin-top:6px">Uploading...</div>
    </div>
    <div class="media-grid" id="media-grid" style="margin-top:16px">
      ${d.data.map(m => `
        <div class="media-item ${pickerMode?'picker-item':''}" onclick="${pickerMode ? `pickMedia('${m.url}')` : `copyMediaUrl('${m.url}')`}">
          <img src="${m.url}" alt="${m.alt||''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖼️</text></svg>'">
          <div class="media-item-info">
            <div class="media-item-name" title="${m.original_name}">${m.original_name}</div>
            <div class="media-item-size">${m.width ? m.width + '×' + m.height + ' · ' : ''}${(m.size/1024).toFixed(0)}KB</div>
          </div>
          ${!pickerMode ? `<button class="delete-btn" onclick="event.stopPropagation();deleteMedia(${m.id})" title="Delete"><i class="fas fa-trash"></i></button>` : ''}
        </div>`).join('')}
    </div>`;

  // Drag and drop
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); uploadMedia(e.dataTransfer.files); });
}

async function uploadMedia(files) {
  if (!files.length) return;
  const prog = document.getElementById('upload-prog');
  const bar = document.getElementById('upload-bar');
  const status = document.getElementById('upload-status');
  prog.style.display = 'block';
  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  status.textContent = `Uploading ${files.length} file(s)...`;
  try {
    const res = await fetch(API + '/api/media/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: fd });
    bar.style.width = '100%';
    const data = await res.json();
    if (data.success) { toast(`${data.data.length} file(s) uploaded!`); setTimeout(() => { prog.style.display='none'; bar.style.width='0'; renderMedia(); }, 500); }
    else { toast(data.error||'Upload failed','error'); prog.style.display='none'; }
  } catch (e) { toast('Upload failed: ' + e.message, 'error'); prog.style.display='none'; }
}

function copyMediaUrl(url) {
  navigator.clipboard.writeText(url).then(() => toast('URL copied to clipboard!')).catch(() => toast(url));
}

async function deleteMedia(id) {
  if (!confirm('Delete this file?')) return;
  try { await request('DELETE', '/api/media/' + id); toast('File deleted'); renderMedia(); }
  catch (e) { toast(e.message, 'error'); }
}

function openMediaPicker(targetField) {
  mediaPickerCallback = (url) => {
    const el = document.getElementById(targetField);
    if (el) { el.value = url; el.dispatchEvent(new Event('input')); }
    closeMediaPicker();
  };
  const overlay = document.createElement('div');
  overlay.id = 'media-picker-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:14px;width:100%;max-width:900px;box-shadow:0 20px 60px rgba(0,0,0,.2)">
      <div style="padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <h3 style="font-size:16px;font-weight:600">Choose from Media Library</h3>
        <button onclick="closeMediaPicker()" style="border:none;background:var(--bg);cursor:pointer;width:32px;height:32px;border-radius:8px;font-size:16px">✕</button>
      </div>
      <div style="padding:24px" id="media-picker-content">Loading...</div>
    </div>`;
  document.body.appendChild(overlay);
  renderMedia(true);
}

function pickMedia(url) { if (mediaPickerCallback) mediaPickerCallback(url); }
function closeMediaPicker() { document.getElementById('media-picker-overlay')?.remove(); }

async function saveCompliance() {
  const body = { title: document.getElementById('co-title').value.trim(), due_date: document.getElementById('co-date').value, type: document.getElementById('co-type').value, description: document.getElementById('co-desc').value };
  if (!body.title || !body.due_date) { toast('Title and date are required','error'); return; }
  try { await request('POST', '/api/compliance', body); toast('Deadline added!'); closeModal(); renderCompliance(); }
  catch (e) { toast(e.message,'error'); }
}

async function updateCompliance(id, status, title, due_date, type, description) {
  try { await request('PUT', '/api/compliance/' + id, { status, title, due_date, type, description }); toast('Updated'); }
  catch (e) { toast(e.message,'error'); }
}

let aiHistory = [];
async function sendAI(msg) {
  const inp = document.getElementById('ai-inp');
  const q = msg || inp.value.trim();
  if (!q) return;
  if (inp) inp.value = '';
  document.getElementById('ai-chips').style.display = 'none';
  addAIMsg(q, 'user');
  aiHistory.push({ role:'user', content:q });
  const typingId = 'typing-' + Date.now();
  addAIMsg('<span style="display:flex;gap:4px"><span style="animation:bounce 1.2s infinite;display:inline-block">●</span><span style="animation:bounce 1.2s .2s infinite;display:inline-block">●</span><span style="animation:bounce 1.2s .4s infinite;display:inline-block">●</span></span>', 'bot', typingId);
  try {
    const d = await request('POST', '/api/ai', { message: q, history: aiHistory.slice(-6) });
    document.getElementById(typingId)?.remove();
    const reply = d?.reply || 'Please contact +91 98850 41052';
    aiHistory.push({ role:'assistant', content:reply });
    addAIMsg(reply, 'bot');
  } catch (e) {
    document.getElementById(typingId)?.remove();
    addAIMsg('Connection error. Please try again.', 'bot');
  }
}

function addAIMsg(text, type, id) {
  const msgs = document.getElementById('ai-msgs');
  const isBot = type === 'bot';
  const div = document.createElement('div');
  if (id) div.id = id;
  div.style.cssText = `display:flex;gap:10px;align-items:flex-start;${!isBot?'flex-direction:row-reverse':''}`;
  div.innerHTML = `
    <div style="width:32px;height:32px;border-radius:50%;background:${isBot?'linear-gradient(135deg,#0F1C35,#2D7A4F)':'var(--primary)'};display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;color:#fff">${isBot?'🤖':'👤'}</div>
    <div style="background:${isBot?'#fff':'var(--primary)'};color:${isBot?'var(--text)':'#fff'};border-radius:${isBot?'4px 14px 14px 14px':'14px 4px 14px 14px'};padding:12px 16px;max-width:80%;font-size:14px;line-height:1.65;${isBot?'box-shadow:0 1px 3px rgba(0,0,0,.08)':''}">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// MODAL HELPERS
// ════════════════════════════════════════
function showModal(html, extraClass = '') {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `<div class="modal ${extraClass}">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}

function closeModal() {
  document.getElementById('modal-overlay')?.remove();
  quillInstance = null;
}
